<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Game</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-lightest: #f0faf0;
    --green-light: #c8efc8;
    --green-mid: #7dce7d;
    --green-main: #4ab54a;
    --green-dark: #2e8b2e;
    --green-deep: #1a5c1a;
    --cream: #fffef5;
    --yellow: #f5e642;
    --orange: #f5a623;
    --brown: #5a3e2b;
    --shadow: rgba(46, 139, 46, 0.18);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background-color: var(--green-lightest);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(125,206,125,0.25) 0%, transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(74,181,74,0.18) 0%, transparent 40%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234ab54a' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 40px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 22px;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: var(--green-deep);
    letter-spacing: 1px;
    text-shadow: 3px 3px 0 var(--green-light), 5px 5px 0 rgba(46,139,46,0.12);
    line-height: 1;
  }

  header p {
    font-size: 0.95rem;
    color: var(--green-dark);
    font-weight: 600;
    margin-top: 6px;
    opacity: 0.8;
  }

  /* ── Stats Bar ── */
  .stats {
    display: flex;
    gap: 14px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-box {
    background: white;
    border: 2.5px solid var(--green-light);
    border-radius: 16px;
    padding: 10px 20px;
    text-align: center;
    box-shadow: 0 3px 0 var(--green-light);
    min-width: 90px;
  }

  .stat-box .label {
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--green-dark);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-box .value {
    font-family: 'Fredoka One', cursive;
    font-size: 1.7rem;
    color: var(--green-deep);
    line-height: 1.1;
  }

  /* ── Game Board ── */
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 480px;
    width: 100%;
  }

  /* ── Card ── */
  .card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.42s cubic-bezier(0.4, 0.2, 0.2, 1);
    border-radius: 16px;
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Back = hidden side (pattern) */
  .card-back {
    background: var(--green-main);
    background-image:
      repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.07) 0px,
        rgba(255,255,255,0.07) 2px,
        transparent 2px,
        transparent 12px
      );
    border: 3px solid var(--green-dark);
    box-shadow: 0 5px 0 var(--green-dark), 0 6px 12px var(--shadow);
    font-size: 1.6rem;
  }

  .card-back::after {
    content: '🌿';
    font-size: 1.5rem;
    opacity: 0.7;
  }

  /* Front = revealed side */
  .card-front {
    background: var(--cream);
    border: 3px solid var(--green-light);
    box-shadow: 0 5px 0 var(--green-light), 0 6px 14px rgba(0,0,0,0.07);
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    transform: rotateY(180deg);
    flex-direction: column;
    gap: 2px;
  }

  .card.matched .card-front {
    background: #edfced;
    border-color: var(--green-mid);
    box-shadow: 0 5px 0 var(--green-mid), 0 6px 14px rgba(74,181,74,0.18);
    animation: matchPop 0.35s ease;
  }

  @keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .card:not(.flipped):not(.matched):hover .card-back {
    background: var(--green-dark);
    transform: translateY(-3px);
    transition: background 0.2s, transform 0.2s;
  }

  .card:not(.flipped):not(.matched):hover .card-inner {
    transform: translateY(-3px);
  }

  /* ── Buttons ── */
  .controls {
    margin-top: 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    padding: 11px 26px;
    border-radius: 14px;
    border: 2.5px solid var(--green-dark);
    cursor: pointer;
    transition: transform 0.13s, box-shadow 0.13s;
    letter-spacing: 0.5px;
  }

  button:active { transform: translateY(3px); box-shadow: none !important; }

  .btn-primary {
    background: var(--green-main);
    color: white;
    box-shadow: 0 5px 0 var(--green-dark);
  }

  .btn-primary:hover { background: var(--green-dark); box-shadow: 0 5px 0 var(--green-deep); }

  .btn-secondary {
    background: white;
    color: var(--green-deep);
    box-shadow: 0 5px 0 var(--green-light);
    border-color: var(--green-mid);
  }

  .btn-secondary:hover { background: var(--green-lightest); }

  /* ── Win Overlay ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 92, 26, 0.65);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .overlay.show { display: flex; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .win-card {
    background: var(--cream);
    border: 3px solid var(--green-mid);
    border-radius: 24px;
    padding: 36px 44px;
    text-align: center;
    box-shadow: 0 12px 0 var(--green-dark), 0 20px 40px rgba(0,0,0,0.25);
    max-width: 340px;
    width: 90%;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .win-card .trophy { font-size: 3.5rem; margin-bottom: 8px; }

  .win-card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--green-deep);
    margin-bottom: 6px;
  }

  .win-card p {
    color: var(--green-dark);
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 22px;
  }

  /* ── Difficulty selector ── */
  .difficulty {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .diff-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.8rem;
    padding: 6px 16px;
    border-radius: 30px;
    border: 2px solid var(--green-mid);
    background: white;
    color: var(--green-deep);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .diff-btn.active, .diff-btn:hover {
    background: var(--green-main);
    color: white;
    border-color: var(--green-dark);
  }

  /* ── Timer bar ── */
  .timer-wrap {
    width: 100%;
    max-width: 480px;
    height: 8px;
    background: var(--green-light);
    border-radius: 99px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green-main), var(--green-mid));
    border-radius: 99px;
    transition: width 1s linear;
  }

  .timer-bar.urgent { background: linear-gradient(90deg, #e85555, #f5a623); }
</style>
</head>
<body>

<header>
  <h1>🍀 Memory Match</h1>
  <p>Find all the matching pairs!</p>
</header>

<div class="stats">
  <div class="stat-box">
    <div class="label">Moves</div>
    <div class="value" id="moves">0</div>
  </div>
  <div class="stat-box">
    <div class="label">Pairs</div>
    <div class="value" id="pairs">0 / 8</div>
  </div>
  <div class="stat-box">
    <div class="label">Time</div>
    <div class="value" id="timer">0s</div>
  </div>
</div>

<div class="difficulty">
  <button class="diff-btn active" data-size="4x4">Easy (4×4)</button>
  <button class="diff-btn" data-size="4x6">Medium (4×6)</button>
  <button class="diff-btn" data-size="6x6">Hard (6×6)</button>
</div>

<div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>

<div class="board" id="board"></div>

<div class="controls">
  <button class="btn-primary" id="newGameBtn">🔄 New Game</button>
  <button class="btn-secondary" id="hintBtn">💡 Hint</button>
</div>

<div class="overlay" id="overlay">
  <div class="win-card">
    <div class="trophy">🏆</div>
    <h2>You Win!</h2>
    <p id="winMsg">Completed in 0 moves and 0s</p>
    <button class="btn-primary" id="playAgainBtn" style="width:100%">Play Again 🎉</button>
  </div>
</div>

<script>
  const EMOJI_POOL = ['🐸','🌸','🦋','🌻','🍓','🐢','🦜','🍀','🌈','🦊',
                      '🐠','🌺','🍉','🦔','🐝','🍄','🌙','⭐','🦭','🐙',
                      '🥝','🦩','🍋','🌊','🐨','🎃','🦄','🍒','🐡','🌵'];

  let cards = [], flipped = [], matched = 0, moves = 0, totalPairs = 8;
  let canFlip = true, timerInterval = null, seconds = 0;
  let gridCols = 4, gridRows = 4;
  let hintUsed = false;

  const board = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  const pairsEl = document.getElementById('pairs');
  const timerEl = document.getElementById('timer');
  const timerBar = document.getElementById('timerBar');
  const overlay = document.getElementById('overlay');
  const winMsg = document.getElementById('winMsg');
  const MAX_TIME = 120; // seconds for timer bar full

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function startGame() {
    clearInterval(timerInterval);
    seconds = 0; moves = 0; matched = 0; flipped = []; canFlip = true; hintUsed = false;
    timerEl.textContent = '0s';
    movesEl.textContent = '0';
    pairsEl.textContent = `0 / ${totalPairs}`;
    timerBar.style.width = '100%';
    timerBar.classList.remove('urgent');
    overlay.classList.remove('show');

    const emojis = shuffle([...EMOJI_POOL]).slice(0, totalPairs);
    cards = shuffle([...emojis, ...emojis]);

    board.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
    board.innerHTML = '';

    cards.forEach((emoji, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.emoji = emoji;
      card.dataset.index = i;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-back"></div>
          <div class="card-front">${emoji}</div>
        </div>`;
      card.addEventListener('click', onCardClick);
      board.appendChild(card);
    });

    timerInterval = setInterval(() => {
      seconds++;
      timerEl.textContent = seconds + 's';
      const pct = Math.max(0, 100 - (seconds / MAX_TIME) * 100);
      timerBar.style.width = pct + '%';
      if (pct < 30) timerBar.classList.add('urgent');
    }, 1000);
  }

  function onCardClick(e) {
    const card = e.currentTarget;
    if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      canFlip = false;
      moves++;
      movesEl.textContent = moves;

      const [a, b] = flipped;
      if (a.dataset.emoji === b.dataset.emoji) {
        a.classList.add('matched');
        b.classList.add('matched');
        matched++;
        pairsEl.textContent = `${matched} / ${totalPairs}`;
        flipped = [];
        canFlip = true;
        if (matched === totalPairs) {
          clearInterval(timerInterval);
          setTimeout(showWin, 500);
        }
      } else {
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flipped = [];
          canFlip = true;
        }, 900);
      }
    }
  }

  function showWin() {
    winMsg.textContent = `Completed in ${moves} moves and ${seconds}s!`;
    overlay.classList.add('show');
  }

  function giveHint() {
    if (hintUsed) return;
    hintUsed = true;
    const unmatched = [...document.querySelectorAll('.card:not(.matched):not(.flipped)')];
    if (unmatched.length < 2) return;
    // find a pair
    const map = {};
    for (const c of unmatched) {
      const e = c.dataset.emoji;
      if (map[e]) {
        map[e].classList.add('flipped');
        c.classList.add('flipped');
        setTimeout(() => {
          if (!map[e].classList.contains('matched')) {
            map[e].classList.remove('flipped');
            c.classList.remove('flipped');
          }
        }, 1200);
        return;
      }
      map[e] = c;
    }
  }

  // Difficulty buttons
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const size = btn.dataset.size;
      if (size === '4x4') { gridCols = 4; gridRows = 4; totalPairs = 8; }
      if (size === '4x6') { gridCols = 4; gridRows = 6; totalPairs = 12; }
      if (size === '6x6') { gridCols = 6; gridRows = 6; totalPairs = 18; }
      startGame();
    });
  });

  document.getElementById('newGameBtn').addEventListener('click', startGame);
  document.getElementById('hintBtn').addEventListener('click', giveHint);
  document.getElementById('playAgainBtn').addEventListener('click', startGame);

  startGame();
</script>
</body>
</html>
